name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend (build + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # `npm install` in plaats van `npm ci`: de huidige lockfile is niet volledig
      # in sync met package.json (firebase v12 vs @angular/fire peer range).
      # Legacy-peer-deps matcht het lokale install-gedrag.
      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps

      # environment.ts en environment.prod.ts staan in .gitignore (bevatten
      # sleutels in productie). Voor typecheck + build in CI gebruiken we de
      # voorbeeld-bestanden; die hebben dezelfde shape met placeholder-waarden.
      - name: Stub environment files
        run: |
          cp src/environments/environment.example.ts src/environments/environment.ts
          cp src/environments/environment.prod.example.ts src/environments/environment.prod.ts

      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Build (development)
        run: npx ng build --configuration development

  functions:
    name: Functions (build + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build
        run: npm run build
