<div class="spelers-container">

  <button mat-fab color="primary" class="fab-add" (click)="addPlayer()" aria-label="Voeg speler toe">
    <mat-icon>add</mat-icon>
  </button>


  <div class="table-container" *ngIf="!loading">
    <table mat-table [dataSource]="dataSource" class="spelers-table">
      
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Spelernaam</th>
        <td mat-cell *matCellDef="let player">{{ player.name }}</td>
      </ng-container>

      <ng-container matColumnDef="position">
        <th mat-header-cell *matHeaderCellDef>Positie</th>
        <td mat-cell *matCellDef="let player">{{ player.position }}</td>
      </ng-container>

      <ng-container matColumnDef="actief">
        <th mat-header-cell *matHeaderCellDef>Actief</th>
        <td mat-cell *matCellDef="let player">{{ getActiefText(player.actief) }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acties</th>
        <td mat-cell *matCellDef="let player">
          <button mat-icon-button color="primary" (click)="editPlayer(player)" aria-label="Wijzig speler">
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>

  <app-loading-state *ngIf="loading" message="Spelers laden..."></app-loading-state>
</div>
