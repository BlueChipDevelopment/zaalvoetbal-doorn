<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav mode="over" class="sidenav" [fixedInViewport]="true">
    <mat-toolbar class="sidenav-toolbar">
      <img src="assets/icons/icon-72x72.png" alt="Zaalvoetbal Doorn Logo" class="sidenav-logo">
    </mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="/klassement" routerLinkActive="active-link" (click)="sidenav.close()">Klassement</a>
      <a mat-list-item routerLink="/records" routerLinkActive="active-link" (click)="sidenav.close()">Records</a>
      <a mat-list-item routerLink="/score" routerLinkActive="active-link" (click)="sidenav.close()">Score Invoeren</a>
      <a mat-list-item routerLink="/team-generator" routerLinkActive="active-link" (click)="sidenav.close()">Team Generator</a>
      <a mat-list-item routerLink="/aanwezigheid" routerLinkActive="active-link" (click)="sidenav.close()">Aanwezigheid</a>
      <a mat-list-item routerLink="/kalender" routerLinkActive="active-link" (click)="sidenav.close()">Kalender</a>
      <a mat-list-item routerLink="/wedstrijden" routerLinkActive="active-link" (click)="sidenav.close()">Wedstrijden</a>
      <a mat-list-item routerLink="/opstelling" routerLinkActive="active-link" (click)="sidenav.close()">Opstelling</a>
      <a mat-list-item routerLink="/beheer" routerLinkActive="active-link" (click)="sidenav.close()">Beheer</a>
      <a mat-list-item routerLink="/about" routerLinkActive="active-link" (click)="sidenav.close()">Over</a>
      <mat-divider *ngIf="(authService.isAuthorizedAdmin$ | async)"></mat-divider>
      <a mat-list-item (click)="logout(); sidenav.close()" *ngIf="(authService.isAuthorizedAdmin$ | async)">
        <mat-icon>logout</mat-icon>
        Uitloggen
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar>
      <button
        type="button"
        aria-label="Toggle sidenav"
        mat-icon-button
        (click)="sidenav.toggle()"
        class="menu-button">
        <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
      </button>
      <button
        *ngIf="showBackButton"
        type="button"
        mat-icon-button
        aria-label="Terug"
        matTooltip="Terug"
        (click)="goBack()"
        class="back-button">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <div class="logo-title-container">
        <img src="assets/icons/icon-72x72.png" alt="Zaalvoetbal Doorn Logo" class="toolbar-logo">
        <span class="toolbar-title">Zaalvoetbal Doorn</span>
      </div>
      <span class="spacer"></span>
      <button 
        mat-icon-button 
        (click)="installPWA()" 
        *ngIf="showInstallButton"
        matTooltip="Installeer app"
        class="install-button">
        <mat-icon>get_app</mat-icon>
      </button>
      <div class="desktop-navigation">
        <button mat-button routerLink="/klassement" routerLinkActive="active-link">Klassement</button>
        <button mat-button routerLink="/records" routerLinkActive="active-link">Records</button>
        <button mat-button routerLink="/score" routerLinkActive="active-link">Score Invoeren</button>
        <button mat-button routerLink="/team-generator" routerLinkActive="active-link">Team Generator</button>
        <button mat-button routerLink="/aanwezigheid" routerLinkActive="active-link">Aanwezigheid</button>
        <button mat-button routerLink="/kalender" routerLinkActive="active-link">Kalender</button>
        <button mat-button routerLink="/wedstrijden" routerLinkActive="active-link">Wedstrijden</button>
        <button mat-button routerLink="/opstelling" routerLinkActive="active-link">Opstelling</button>
        <button mat-button routerLink="/beheer" routerLinkActive="active-link">Beheer</button>
        <button mat-button routerLink="/about" routerLinkActive="active-link">Over</button>
        <button mat-button (click)="logout()" *ngIf="(authService.isAuthorizedAdmin$ | async)">
          <mat-icon>logout</mat-icon>
          Uitloggen
        </button>
      </div>
    </mat-toolbar>    
      <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
