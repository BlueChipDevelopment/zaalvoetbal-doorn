<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav mode="over" class="sidenav" [fixedInViewport]="true">
    <mat-toolbar class="sidenav-toolbar">
      <img src="assets/icons/icon-72x72.png" alt="Zaalvoetbal Doorn Logo" class="sidenav-logo">
    </mat-toolbar>
    <mat-nav-list>
      <h3 matSubheader>Bekijken</h3>
      <a mat-list-item routerLink="/klassement" routerLinkActive="active-link" (click)="sidenav.close()">
        <mat-icon matListItemIcon>leaderboard</mat-icon>
        <span matListItemTitle>Klassement</span>
      </a>
      <a mat-list-item routerLink="/records" routerLinkActive="active-link" (click)="sidenav.close()">
        <mat-icon matListItemIcon>emoji_events</mat-icon>
        <span matListItemTitle>Records</span>
      </a>
      <a mat-list-item routerLink="/wedstrijden" routerLinkActive="active-link" (click)="sidenav.close()">
        <mat-icon matListItemIcon>sports_soccer</mat-icon>
        <span matListItemTitle>Wedstrijden</span>
      </a>

      <mat-divider></mat-divider>
      <h3 matSubheader>Plannen &amp; spelen</h3>
      <a mat-list-item routerLink="/aanwezigheid" routerLinkActive="active-link" (click)="sidenav.close()">
        <mat-icon matListItemIcon>how_to_reg</mat-icon>
        <span matListItemTitle>Aanwezigheid</span>
      </a>
      <a mat-list-item routerLink="/kalender" routerLinkActive="active-link" (click)="sidenav.close()">
        <mat-icon matListItemIcon>calendar_month</mat-icon>
        <span matListItemTitle>Kalender</span>
      </a>
      <a mat-list-item routerLink="/team-generator" routerLinkActive="active-link" (click)="sidenav.close()">
        <mat-icon matListItemIcon>shuffle</mat-icon>
        <span matListItemTitle>Team Generator</span>
      </a>
      <a mat-list-item routerLink="/opstelling" routerLinkActive="active-link" (click)="sidenav.close()">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Opstelling</span>
      </a>
      <a mat-list-item routerLink="/score" routerLinkActive="active-link" (click)="sidenav.close()">
        <mat-icon matListItemIcon>edit_note</mat-icon>
        <span matListItemTitle>Score invoeren</span>
      </a>

      <mat-divider></mat-divider>
      <h3 matSubheader>App</h3>
      <a mat-list-item routerLink="/beheer" routerLinkActive="active-link" (click)="sidenav.close()">
        <mat-icon matListItemIcon>admin_panel_settings</mat-icon>
        <span matListItemTitle>Beheer</span>
      </a>
      <a mat-list-item routerLink="/about" routerLinkActive="active-link" (click)="sidenav.close()">
        <mat-icon matListItemIcon>info</mat-icon>
        <span matListItemTitle>Over</span>
      </a>
      <a mat-list-item (click)="logout(); sidenav.close()" *ngIf="(authService.isAuthorizedAdmin$ | async)">
        <mat-icon matListItemIcon>logout</mat-icon>
        <span matListItemTitle>Uitloggen</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar>
      <button
        type="button"
        aria-label="Toggle sidenav"
        mat-icon-button
        (click)="sidenav.toggle()"
        class="menu-button">
        <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
      </button>
      <button
        *ngIf="showBackButton"
        type="button"
        mat-icon-button
        aria-label="Terug"
        matTooltip="Terug"
        (click)="goBack()"
        class="back-button">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <div class="logo-title-container">
        <img src="assets/icons/icon-72x72.png" alt="Zaalvoetbal Doorn Logo" class="toolbar-logo">
        <span class="toolbar-title">Zaalvoetbal Doorn</span>
      </div>
      <span class="spacer"></span>
      <button 
        mat-icon-button 
        (click)="installPWA()" 
        *ngIf="showInstallButton"
        matTooltip="Installeer app"
        class="install-button">
        <mat-icon>get_app</mat-icon>
      </button>
      <div class="desktop-navigation">
        <div class="nav-group">
          <button mat-button routerLink="/klassement" routerLinkActive="active-link">Klassement</button>
          <button mat-button routerLink="/records" routerLinkActive="active-link">Records</button>
          <button mat-button routerLink="/wedstrijden" routerLinkActive="active-link">Wedstrijden</button>
        </div>
        <span class="nav-separator" aria-hidden="true"></span>
        <div class="nav-group">
          <button mat-button routerLink="/aanwezigheid" routerLinkActive="active-link">Aanwezigheid</button>
          <button mat-button routerLink="/kalender" routerLinkActive="active-link">Kalender</button>
          <button mat-button routerLink="/team-generator" routerLinkActive="active-link">Team Generator</button>
          <button mat-button routerLink="/opstelling" routerLinkActive="active-link">Opstelling</button>
          <button mat-button routerLink="/score" routerLinkActive="active-link">Score invoeren</button>
        </div>
        <span class="nav-separator" aria-hidden="true"></span>
        <div class="nav-group">
          <button mat-button routerLink="/beheer" routerLinkActive="active-link">Beheer</button>
          <button mat-button routerLink="/about" routerLinkActive="active-link">Over</button>
          <button mat-button (click)="logout()" *ngIf="(authService.isAuthorizedAdmin$ | async)">
            <mat-icon>logout</mat-icon>
            Uitloggen
          </button>
        </div>
      </div>
    </mat-toolbar>    
      <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
