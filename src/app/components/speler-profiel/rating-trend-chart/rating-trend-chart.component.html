<svg
  *ngIf="points.length >= 2; else emptyState"
  class="trend-chart"
  [attr.viewBox]="'0 0 ' + viewBoxWidth + ' ' + viewBoxHeight"
  preserveAspectRatio="none"
  role="img"
  aria-label="Rating-trend over tijd"
>
  <path [attr.d]="pathD" fill="none" stroke="#1976d2" stroke-width="2" stroke-linejoin="round" />
</svg>
<ng-template #emptyState>
  <p class="empty">Onvoldoende wedstrijden voor een trendlijn.</p>
</ng-template>
